name: Quality Gate
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: '**/*.md'
      - name: Check references exist
        run: |
          exitcode=0
          while IFS= read -r f; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exitcode=1
            fi
          done < <(grep -oP '`references/[^`]+`' SKILL.md | tr -d '`')
          exit $exitcode
      - name: Count scenario tests
        run: |
          count=$(grep -cE '\| [A-Z]{1,3}[0-9]?-[0-9]{2} \|' references/scenario-tests.md)
          if [ "$count" -lt 49 ]; then
            echo "FAIL: only $count tests, need 49+"
            exit 1
          fi
          echo "OK: $count tests found"
